<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOE Signage - v3.9.4 Final Polish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .sidebar-icon { cursor: pointer; transition: 0.3s; opacity: 0.5; color: #94a3b8; }
        .sidebar-icon:hover, .active { opacity: 1; transform: scale(1.1); color: #22d3ee; }
        .nav-btn { background: #1e293b; border-radius: 10px; padding: 10px; border: 1px solid #334155; color: #94a3b8; transition: 0.2s; }
        .nav-btn:hover { background: #334155; color: #22d3ee; border-color: #22d3ee; }
        
        .jadwal-card { 
            background: linear-gradient(145deg, #0f172a, #020617); 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            padding: 10px;
            display: flex; flex-direction: column; height: 100%;
        }
        .info-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 4px; margin-top: 2px; }
        .info-box { 
            background: rgba(30, 41, 59, 0.2); 
            padding: 5px 8px; 
            border-radius: 6px; 
            border: 1px solid rgba(51, 65, 85, 0.3); 
            display: flex; flex-direction: column;
        }
        
        /* Font Besar (v3.9 Standard) */
        .label-mini { font-size: 10px; color: #475569; font-weight: 800; text-transform: uppercase; margin-bottom: 1px; }
        .val-mini { font-size: 14px; color: #e2e8f0; font-weight: 500; line-height: 1.3; }
        
        iframe { width: 100%; height: 100vh; border: none; }
        #progress-bar { height: 4px; background: #22d3ee; width: 0%; transition: width 0.1s linear; position: fixed; top: 0; left: 80px; z-index: 99; }
    </style>
</head>
<body class="flex">

    <div id="progress-bar"></div>

    <nav class="w-20 h-screen bg-slate-950 flex flex-col items-center py-6 space-y-6 border-r border-slate-900 z-50">
        <div class="text-cyan-500 font-black text-xl italic mb-4">BOE</div>
        <button onclick="changeMenu(0)" class="sidebar-icon text-2xl" id="nav-0">🏠</button>
        <button onclick="changeMenu(1)" class="sidebar-icon text-2xl" id="nav-1">📅</button>
        <button onclick="changeMenu(2)" class="sidebar-icon text-2xl" id="nav-2">📺</button>
        <button onclick="changeMenu(3)" class="sidebar-icon text-2xl" id="nav-3">🖼️</button>
        <button onclick="changeMenu(4)" class="sidebar-icon text-2xl" id="nav-4">📖</button>
        <div class="flex-grow"></div>
        <div class="flex flex-col space-y-3 mb-2">
            <button onclick="handleAction('prev')" class="nav-btn text-xl">⏪</button>
            <button onclick="handleAction('next')" class="nav-btn text-xl">⏩</button>
        </div>
        <button onclick="toggleLoop()" id="loopBtn" class="nav-btn text-xl">▶️</button>
        <button onclick="toggleAdmin()" class="sidebar-icon text-xl opacity-20">⚙️</button>
    </nav>

    <main class="flex-1 h-screen relative bg-[#020617]" id="main-display">
        <div id="display-container" class="w-full h-full"></div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[100]">
        <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-lg border border-slate-700">
            <h2 class="text-cyan-400 font-bold mb-4 uppercase tracking-widest">Settings Panel</h2>
            <div id="admin-inputs" class="space-y-3"></div>
            <button onclick="saveAdmin()" class="w-full bg-cyan-600 mt-6 p-3 rounded-lg font-bold">SAVE CONFIG</button>
            <button onclick="toggleAdmin()" class="w-full text-slate-500 mt-2">CANCEL</button>
        </div>
    </div>

    <script>
        let currentMenu = 0;
        let isLooping = false;
        let progress = 0;
        let loopTimer;
        let jadwalData = [];
        let currentJadwalPage = 0;

        let config = JSON.parse(localStorage.getItem('boe_v394')) || {
            links: ["", "", "", ""],
            durasis: [30, 30, 30, 30]
        };

        const inputContainer = document.getElementById('admin-inputs');
        ["ID Spreadsheet", "Link Video", "Link Infografis", "Link Flipbook"].forEach((label, i) => {
            inputContainer.innerHTML += `<div class="flex flex-col"><label class="text-[10px] text-slate-500 uppercase">${label}</label><input id="l-${i}" type="text" value="${config.links[i]}" class="bg-slate-800 border border-slate-700 p-2 rounded text-cyan-400 outline-none font-mono text-xs"></div>`;
        });

        // Pembersihan Data & Deteksi Pemisah Orang (TANDA TITIK KOMA)
        const formatCell = (str) => {
            if (!str || str === '""' || str === '-') return '-';
            let clean = str.replace(/"/g, '').trim();
            clean = clean.replace(/,+$/, ''); // Hapus koma di ujung akhir

            if (clean.includes(';')) {
                return clean.split(';').map(s => s.trim()).join('<br>');
            }
            return clean;
        };

        function changeMenu(index) {
            currentMenu = index;
            document.querySelectorAll('.sidebar-icon').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${index}`).classList.add('active');
            renderContent();
        }

        async function fetchJadwalData() {
            const id = config.links[0];
            if(!id) return;
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=Sheet1`);
                const text = await res.text();
                const rows = text.split('\n').slice(1).map(r => 
                    r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim())
                );
                jadwalData = rows.filter(r => r[2] && r[2].length > 5);
            } catch (e) { console.error("Sync Error"); }
        }

        function renderJadwalPage() {
            const container = document.getElementById('display-container');
            const itemsPerPage = 6;
            const start = currentJadwalPage * itemsPerPage;
            const pageData = jadwalData.slice(start, start + itemsPerPage);

            let html = `
            <div class="p-4 h-screen flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xl font-black uppercase text-cyan-500 italic">Jadwal Progli 50</h2>
                </div>
                <div class="grid grid-cols-3 grid-rows-2 gap-3 flex-1">`;
            
            pageData.forEach(row => {
                // Judul Diklat - Bersihkan Petik
                const judulClean = row[2].replace(/"/g, '').trim();

                html += `
                <div class="jadwal-card">
                    <div class="flex justify-between items-center mb-1">
                        <span class="px-2 py-0.5 bg-cyan-900/40 text-cyan-400 rounded text-[10px] font-bold uppercase">${formatCell(row[0])}</span>
                        <span class="text-slate-600 text-[10px] font-bold">ANGKATAN ${row[1]}</span>
                    </div>

                    <h3 class="text-lg font-bold text-white leading-tight mb-1 border-b border-slate-800/50 pb-1 uppercase overflow-hidden line-clamp-2 min-h-[48px]">${judulClean}</h3>
                    
                    <div class="flex items-center justify-center space-x-2 text-[11px] font-mono text-cyan-300 mb-1 bg-slate-900/80 py-1 rounded border border-slate-800">
                        <span>${formatCell(row[3])}</span> <span class="text-slate-700">|</span> <span>${formatCell(row[4])}</span>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-box"><p class="label-mini">Pengajar</p><p class="val-mini">${formatCell(row[5])}</p></div>
                        <div class="info-box"><p class="label-mini">Asessor</p><p class="val-mini">${formatCell(row[6])}</p></div>
                        <div class="info-box"><p class="label-mini">Teknisi</p><p class="val-mini">${formatCell(row[7])}</p></div>
                        <div class="info-box"><p class="label-mini">Digital Content</p><p class="val-mini">${formatCell(row[8])}</p></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html + `</div></div>`;
        }

        async function renderContent() {
            const container = document.getElementById('display-container');
            container.innerHTML = "";
            if (currentMenu === 0) {
                container.innerHTML = `<div class="flex items-center justify-center h-full flex-col text-center uppercase"><h1 class="text-6xl font-black italic">DEPARTEMEN <span class="text-cyan-500">LISTRIK</span></h1></div>`;
            } else if (currentMenu === 1) {
                await fetchJadwalData();
                renderJadwalPage();
            } else {
                let url = config.links[currentMenu - 1];
                if(url) {
                    if(url.includes('youtube.com/embed')) url += (url.includes('?') ? '&' : '?') + "enablejsapi=1";
                    container.innerHTML = `<iframe id="content-frame" src="${url}"></iframe>`;
                }
            }
        }

        function handleAction(type) {
            if (currentMenu === 1) {
                const maxPages = Math.ceil(jadwalData.length / 6);
                currentJadwalPage = type === 'next' ? (currentJadwalPage + 1) % maxPages : (currentJadwalPage - 1 + maxPages) % maxPages;
                renderJadwalPage();
            } else if (currentMenu === 2) {
                const frame = document.getElementById('content-frame');
                frame?.contentWindow.postMessage(JSON.stringify({"event":"command","func":type === 'next' ? 'nextVideo' : 'previousVideo',"args":""}), "*");
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loopBtn');
            btn.innerHTML = isLooping ? "⏸️" : "▶️";
            if(isLooping) startLoop(); else clearInterval(loopTimer);
        }

        function startLoop() {
            clearInterval(loopTimer);
            loopTimer = setInterval(() => {
                const dur = config.durasis[currentMenu-1] || 30;
                progress += (100 / (dur * 10));
                document.getElementById('progress-bar').style.width = progress + '%';
                if(progress >= 100) { handleAction('next'); progress = 0; }
            }, 100);
        }

        function toggleAdmin() { document.getElementById('adminModal').classList.toggle('hidden'); document.getElementById('adminModal').classList.toggle('flex'); }
        function saveAdmin() {
            for(let i=0; i<4; i++) config.links[i] = document.getElementById(`l-${i}`).value;
            localStorage.setItem('boe_v394', JSON.stringify(config));
            location.reload();
        }

        changeMenu(0);
    </script>
</body>
</html>
